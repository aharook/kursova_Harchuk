name: C++ CI Build & Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    # Використовуємо Windows, бо в коді є прив'язка до C:\Windows\Fonts
    runs-on: windows-latest

    steps:
    # 1. Завантажуємо твій код на віртуальну машину
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Створюємо файли для збірки за допомогою CMake
    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release

    # 3. Компілюємо проєкт
    - name: Build
      run: cmake --build ${{github.workspace}}/build --config Release

    # 4. Запускаємо тести
    - name: Run Tests
      working-directory: ${{github.workspace}}/build
      run: ctest -C Release --output-on-failure

    # 5. (Опціонально) Зберігаємо скомпільований .exe файл, щоб його можна було завантажити
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Coursework-App
        path: ${{github.workspace}}/build/Release/*.exe # Шлях може трохи відрізнятися залежно від твого CMakeLists
